name: Comic Bot Keepalive
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

concurrency:
  group: comic-bot-singleton
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - run: pip install -r requirements.txt

      - name: Write Telegram config
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "{\"telegram\":{\"enabled\":true,\"bot_token\":\"$BOT_TOKEN\",\"chat_id\":\"$CHAT_ID\"}}" > notification_config.json
          cat notification_config.json

      - name: Run bot
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_PAT }}
          GDRIVE_SA_JSON: ${{ secrets.GDRIVE_SA_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python -u telegram_bot_listener.py

      - name: Upload downloaded comics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comics-${{ github.run_id }}
          path: |
            Komik/
            Result/
          retention-days: 30
          if-no-files-found: ignore
